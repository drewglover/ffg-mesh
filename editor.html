<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mesh gradient editor</title>
<style>
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; color: white;
    background: #06070b; }

  /* Page backdrop — deliberately darker than the canvas bgColor so the
     canvas frame is visible. Not tied to the gradient bgColor anymore. */
  #bg-color-source { position: fixed; inset: 0; z-index: -2; background: #06070b; }

  /* Stage holds the centered canvas-frame. Sits to the left of the sidebar. */
  #stage {
    position: fixed; top: 0; left: 0; right: 420px; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 80px 80px;
    z-index: 0;
  }
  /* The bounded gradient canvas. WebGL canvas mounts inside this and fills it.
     Sized at 50% of the stage so introFrom positions at -0.3 / 1.3 land
     comfortably inside the viewport buffer instead of off-screen. */
  #canvas-frame {
    position: relative;
    width: 50%; height: auto;
    aspect-ratio: 16 / 10;
    max-width: 820px; max-height: calc(100vh - 220px);
    border-radius: 14px; overflow: hidden;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.55),
      0 12px 28px rgba(0,0,0,0.45),
      0 0 0 1px rgba(255,255,255,0.06);
  }

  /* SVG wireframe spans full viewport so off-canvas nodes/handles render
     in the buffer area around the canvas-frame. */
  #wireframe { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  #wireframe .mesh-edge { fill: none; stroke: rgba(255,255,255,0.35); stroke-width: 1.5; }
  #wireframe .handle-line { fill: none; stroke: rgba(255,255,255,0.5); stroke-width: 1; stroke-dasharray: 3 3; }
  #wireframe .frame-bounds {
    fill: none; stroke: rgba(255,255,255,0.06); stroke-width: 1; stroke-dasharray: 4 4;
  }

  /* Drag layer captures node + handle drags. Also full-viewport so off-bounds
     handles remain interactive. */
  #drag-layer { position: fixed; inset: 0; z-index: 2; pointer-events: none; }

  .node-handle {
    position: absolute; width: 22px; height: 22px; margin: -11px 0 0 -11px;
    border: 2px solid white; border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(0,0,0,0.4);
    cursor: grab; pointer-events: auto;
    transition: transform 0.12s;
  }
  .node-handle:hover { transform: scale(1.15); }
  .node-handle.dragging { cursor: grabbing; transform: scale(1.25); }
  .node-handle.selected {
    box-shadow: 0 0 0 3px white, 0 2px 8px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(0,0,0,0.4);
    z-index: 2;
  }

  /* Bezier tangent handle (square). */
  .tangent-handle {
    position: absolute; width: 12px; height: 12px; margin: -6px 0 0 -6px;
    background: rgba(255,255,255,0.92); border: 1px solid rgba(0,0,0,0.5);
    cursor: grab; pointer-events: auto; z-index: 3;
    transition: transform 0.12s;
  }
  .tangent-handle:hover { transform: scale(1.25); }
  .tangent-handle.dragging { cursor: grabbing; transform: scale(1.35); background: #ffe45b; }

  /* Sidebar — anchored full-height on the right edge. */
  #panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 420px; z-index: 10;
    background: #11131b;
    border-left: 1px solid rgba(255,255,255,0.06);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #panel-header {
    padding: 14px 18px; border-bottom: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
  }
  #panel-title { font-size: 13px; font-weight: 500; letter-spacing: 0.02em; }
  #panel-body { padding: 14px 18px 20px; overflow-y: auto; flex: 1; }
  #panel-footer {
    padding: 12px 18px; border-top: 1px solid rgba(255,255,255,0.06); flex-shrink: 0;
    display: flex; gap: 8px; flex-wrap: wrap;
  }

  .section { margin-bottom: 18px; }
  .section-title {
    font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em;
    opacity: 0.55; margin: 0 0 8px;
  }

  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
  .row label { flex: 0 0 70px; opacity: 0.7; }
  .row input[type="range"] { flex: 1; min-width: 0; }
  .row .val {
    flex: 0 0 56px; text-align: right; font-variant-numeric: tabular-nums; opacity: 0.85;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    color: white; padding: 3px 6px; border-radius: 4px; font: inherit; font-size: 12px;
    -moz-appearance: textfield;
  }
  .row .val::-webkit-outer-spin-button, .row .val::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .row .val:focus { outline: none; border-color: rgba(120, 150, 255, 0.6); opacity: 1; }
  .row input[type="text"], .row input[type="number"] {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    color: white; padding: 5px 8px; border-radius: 4px; font: inherit;
  }
  .row input[type="color"] { width: 40px; height: 24px; padding: 0; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px; background: none; cursor: pointer; }

  /* Grid picker: visual 4x4 of swatches to select a vertex. */
  #grid-picker { display: grid; gap: 4px; margin-bottom: 8px; }
  .grid-cell {
    width: 100%; aspect-ratio: 1; border-radius: 4px; cursor: pointer;
    border: 2px solid transparent; box-sizing: border-box;
    background-clip: padding-box;
  }
  .grid-cell.selected { border-color: white; }
  .grid-cell:hover { transform: scale(1.05); }

  button.btn {
    background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.12);
    padding: 7px 12px; border-radius: 6px; font: inherit; font-size: 12px; cursor: pointer;
  }
  button.btn:hover { background: rgba(255,255,255,0.14); }
  button.btn.primary { background: rgba(100, 130, 255, 0.3); border-color: rgba(120, 150, 255, 0.5); }
  button.btn.tiny { padding: 3px 8px; font-size: 11px; }
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

  #node-detail { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 10px; margin-bottom: 12px; }
  #node-detail.hidden { display: none; }
  #node-detail .section-title { margin-top: 12px; }
  #node-detail .section-title:first-child { margin-top: 0; }

  /* Compact handle row: two number inputs side by side. */
  .handle-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 12px; }
  .handle-row label { flex: 0 0 50px; opacity: 0.7; text-transform: uppercase; font-size: 10px; letter-spacing: 0.08em; }
  .handle-row .pair { flex: 1; display: flex; gap: 4px; }
  .handle-row .pair input {
    flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    color: white; padding: 3px 6px; border-radius: 4px; font: inherit; font-size: 11px;
    -moz-appearance: textfield; min-width: 0;
  }
  .handle-row .pair input::-webkit-outer-spin-button, .handle-row .pair input::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .handle-row .reset {
    background: none; border: none; color: white; opacity: 0.4; cursor: pointer; font-size: 12px; padding: 0 4px;
  }
  .handle-row .reset:hover { opacity: 1; }
  .handle-row.disabled label { opacity: 0.25; }
  .handle-row.disabled .pair input { opacity: 0.25; pointer-events: none; }
  .handle-row.disabled .reset { display: none; }

  /* Export modal */
  #export-modal {
    position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center; background: rgba(0,0,0,0.6);
  }
  #export-modal.open { display: flex; }
  .modal-card {
    background: #1a1a26; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    padding: 20px; width: min(720px, 90vw); max-height: 80vh; display: flex; flex-direction: column;
  }
  .modal-card h3 { margin: 0 0 12px; font-size: 14px; font-weight: 500; }
  .modal-card textarea {
    flex: 1; min-height: 360px; width: 100%; box-sizing: border-box;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; line-height: 1.5;
    background: rgba(0,0,0,0.4); color: #c8e0ff; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px; padding: 12px; resize: vertical;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

  .toggle-row { display: flex; align-items: center; gap: 8px; font-size: 12px; margin-bottom: 6px; }
  .toggle-row input[type="checkbox"] { accent-color: #6e8eff; }
</style>
</head>
<body>

<div id="bg-color-source"></div>
<main id="stage"><div id="canvas-frame"></div></main>
<svg id="wireframe" preserveAspectRatio="none"></svg>
<div id="drag-layer"></div>

<aside id="panel">
  <header id="panel-header">
    <span id="panel-title">Mesh gradient editor</span>
  </header>
  <div id="panel-body">

    <div class="section">
      <div class="section-title">Background</div>
      <div class="row">
        <label>Color</label>
        <input type="color" id="bg-color" value="#0a0a14">
        <input type="text" id="bg-color-hex" value="#0a0a14" style="max-width: 90px;">
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="show-nodes" checked>
        <label for="show-nodes">Show nodes</label>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="show-wireframe" checked>
        <label for="show-wireframe">Show mesh wireframe</label>
      </div>
      <div class="toggle-row">
        <input type="checkbox" id="show-all-handles">
        <label for="show-all-handles">Show all bezier handles</label>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Animation</div>
      <div class="row"><label>Intro</label><input type="range" id="intro-dur" min="200" max="5000" step="100" value="1800"><input type="number" class="val" id="intro-dur-val" min="0" max="20000" step="100" value="1800"></div>
      <div class="row"><label>Outro</label><input type="range" id="outro-dur" min="200" max="5000" step="100" value="1400"><input type="number" class="val" id="outro-dur-val" min="0" max="20000" step="100" value="1400"></div>
      <div class="btn-row">
        <button class="btn" id="play-intro">Play intro</button>
        <button class="btn" id="play-outro">Play outro</button>
      </div>
    </div>

    <!-- Per-vertex detail editor -->
    <div id="node-detail" class="hidden">
      <div class="section-title" id="detail-title">Vertex</div>
      <div class="row">
        <label>Color</label>
        <input type="color" id="n-color">
        <input type="text" id="n-color-hex" style="max-width: 90px;">
      </div>
      <div class="row"><label>X</label><input type="range" id="n-x" min="-0.2" max="1.2" step="0.005"><input type="number" class="val" id="n-x-val" min="-2" max="2" step="0.001"></div>
      <div class="row"><label>Y</label><input type="range" id="n-y" min="-0.2" max="1.2" step="0.005"><input type="number" class="val" id="n-y-val" min="-2" max="2" step="0.001"></div>

      <div class="section-title">Bezier handles (Δ from vertex)</div>
      <div class="handle-row" data-dir="e">
        <label>East</label>
        <div class="pair">
          <input type="number" data-axis="x" step="0.005" placeholder="dx">
          <input type="number" data-axis="y" step="0.005" placeholder="dy">
        </div>
        <button class="reset" title="Reset to default">↺</button>
      </div>
      <div class="handle-row" data-dir="w">
        <label>West</label>
        <div class="pair">
          <input type="number" data-axis="x" step="0.005" placeholder="dx">
          <input type="number" data-axis="y" step="0.005" placeholder="dy">
        </div>
        <button class="reset" title="Reset to default">↺</button>
      </div>
      <div class="handle-row" data-dir="n">
        <label>North</label>
        <div class="pair">
          <input type="number" data-axis="x" step="0.005" placeholder="dx">
          <input type="number" data-axis="y" step="0.005" placeholder="dy">
        </div>
        <button class="reset" title="Reset to default">↺</button>
      </div>
      <div class="handle-row" data-dir="s">
        <label>South</label>
        <div class="pair">
          <input type="number" data-axis="x" step="0.005" placeholder="dx">
          <input type="number" data-axis="y" step="0.005" placeholder="dy">
        </div>
        <button class="reset" title="Reset to default">↺</button>
      </div>

      <div class="section-title">Intro from</div>
      <div class="row"><label>X</label><input type="range" id="n-ix" min="-0.5" max="1.5" step="0.01"><input type="number" class="val" id="n-ix-val" min="-2" max="2" step="0.01"></div>
      <div class="row"><label>Y</label><input type="range" id="n-iy" min="-0.5" max="1.5" step="0.01"><input type="number" class="val" id="n-iy-val" min="-2" max="2" step="0.01"></div>

      <div class="section-title">Outro to</div>
      <div class="row"><label>X</label><input type="range" id="n-ox" min="-0.5" max="1.5" step="0.01"><input type="number" class="val" id="n-ox-val" min="-2" max="2" step="0.01"></div>
      <div class="row"><label>Y</label><input type="range" id="n-oy" min="-0.5" max="1.5" step="0.01"><input type="number" class="val" id="n-oy-val" min="-2" max="2" step="0.01"></div>
    </div>

    <!-- Visual 4x4 picker -->
    <div class="section">
      <div class="section-title">Vertex grid <span style="opacity: 0.4; font-weight: 400; text-transform: none; letter-spacing: 0;">(click to select)</span></div>
      <div id="grid-picker"></div>
    </div>
  </div>
  <footer id="panel-footer">
    <button class="btn primary" id="export-btn">Export</button>
    <button class="btn" id="share-btn" title="Copy a shareable URL for this gradient">Copy share link</button>
    <button class="btn" id="reset-btn">Reset</button>
  </footer>
</aside>

<div id="export-modal">
  <div class="modal-card">
    <h3>Config — paste into your <code>MeshGradient</code> constructor</h3>
    <textarea id="export-text" readonly></textarea>
    <div class="modal-actions">
      <button class="btn" id="copy-btn">Copy</button>
      <button class="btn" id="close-modal">Close</button>
    </div>
  </div>
</div>

<script type="module">
  import { MeshGradient, defaultGrid } from './mesh-gradient.js';

  // ---------- defaults ----------
  const ROWS = 4, COLS = 4;
  const defaultConfig = {
    bgColor: '#0a0a14',
    introDuration: 1800,
    outroDuration: 1400,
    floatAmplitude: 0.025,
    floatSpeed: 0.00018,
    rows: ROWS,
    cols: COLS,
    vertices: defaultGrid(ROWS, COLS),
  };

  let config = structuredClone(defaultConfig);
  let selectedVertexIndex = null;
  let gradient = null;
  let showNodes = true;
  let showWireframe = true;
  let showAllHandles = false;

  // ---------- gradient lifecycle ----------
  // Mounts the WebGL canvas inside #canvas-frame so the gradient is bounded
  // to a card-sized area, with off-bounds nodes/handles visible in the
  // surrounding stage buffer.
  function rebuildGradient(skipIntro = true) {
    if (gradient) {
      gradient.destroy();
      gradient = null;
    }
    const cfg = structuredClone(config);
    cfg.container = document.getElementById('canvas-frame');
    gradient = new MeshGradient(cfg);
    if (skipIntro) {
      gradient.state = 'floating';
      gradient.stateStart = performance.now();
    } else {
      gradient.playIntro();
    }
    if (!gradient._running) gradient._loop();
    // Page bg stays static and dark (so the canvas frame is visible). The
    // gradient bgColor only affects the inside of the canvas now.
  }

  // ---------- DOM refs ----------
  const $ = id => document.getElementById(id);
  const dragLayer = $('drag-layer');
  const wireframe = $('wireframe');
  const gridPicker = $('grid-picker');
  const canvasFrame = $('canvas-frame');

  // ---------- coords ----------
  // Mesh space (0..1, y-up) ↔ viewport DOM space (px, y-down).
  // Mesh [0,1] maps to the canvas-frame's rectangle within the viewport;
  // mesh values outside [0,1] land in the surrounding stage buffer so
  // off-bounds nodes (e.g. introFrom at -0.3) remain visible and draggable.
  function canvasBounds() {
    const r = canvasFrame.getBoundingClientRect();
    return { left: r.left, top: r.top, width: r.width, height: r.height };
  }
  function meshToDom(mx, my) {
    const b = canvasBounds();
    return [b.left + mx * b.width, b.top + (1 - my) * b.height];
  }
  function domToMesh(px, py) {
    const b = canvasBounds();
    return [(px - b.left) / b.width, 1 - (py - b.top) / b.height];
  }

  // ---------- grid helpers ----------
  const vi  = (i, j) => j * config.cols + i;
  const ij  = (k)    => ({ i: k % config.cols, j: Math.floor(k / config.cols) });
  function defaultHandleFor(i, j, dir) {
    const hx = 1 / ((config.cols - 1) * 3);
    const hy = 1 / ((config.rows - 1) * 3);
    if (dir === 'e') return (i < config.cols - 1) ? [ hx, 0] : null;
    if (dir === 'w') return (i > 0)               ? [-hx, 0] : null;
    if (dir === 'n') return (j < config.rows - 1) ? [ 0,  hy] : null;
    if (dir === 's') return (j > 0)               ? [ 0, -hy] : null;
    return null;
  }

  // ---------- wireframe rendering ----------
  // Draw the cubic Bezier edges of the mesh as SVG paths. Done in DOM/SVG
  // coordinates so they overlay the canvas correctly.
  function renderWireframe() {
    const W = window.innerWidth, H = window.innerHeight;
    wireframe.setAttribute('viewBox', `0 0 ${W} ${H}`);
    wireframe.setAttribute('width', W);
    wireframe.setAttribute('height', H);
    wireframe.innerHTML = '';
    if (!showWireframe) return;

    const pathParts = [];
    // Horizontal edges
    for (let j = 0; j < config.rows; j++) {
      for (let i = 0; i < config.cols - 1; i++) {
        pathParts.push(bezierPath(vi(i, j), vi(i + 1, j), 'e', 'w'));
      }
    }
    // Vertical edges
    for (let i = 0; i < config.cols; i++) {
      for (let j = 0; j < config.rows - 1; j++) {
        pathParts.push(bezierPath(vi(i, j), vi(i, j + 1), 'n', 's'));
      }
    }
    const ns = 'http://www.w3.org/2000/svg';
    const path = document.createElementNS(ns, 'path');
    path.setAttribute('d', pathParts.join(' '));
    path.setAttribute('class', 'mesh-edge');
    wireframe.appendChild(path);

    // Handle guide lines (vertex → bezier handle, dashed)
    const showHandleSet = new Set();
    if (selectedVertexIndex !== null) showHandleSet.add(selectedVertexIndex);
    if (showAllHandles) for (let k = 0; k < config.vertices.length; k++) showHandleSet.add(k);

    showHandleSet.forEach(k => {
      const v = config.vertices[k];
      ['e', 'w', 'n', 's'].forEach(dir => {
        if (!v.handles[dir]) return;
        const [vx, vy] = meshToDom(v.position[0], v.position[1]);
        const [hx, hy] = meshToDom(v.position[0] + v.handles[dir][0], v.position[1] + v.handles[dir][1]);
        const line = document.createElementNS(ns, 'line');
        line.setAttribute('x1', vx); line.setAttribute('y1', vy);
        line.setAttribute('x2', hx); line.setAttribute('y2', hy);
        line.setAttribute('class', 'handle-line');
        wireframe.appendChild(line);
      });
    });
  }

  function bezierPath(aIdx, bIdx, dirAB, dirBA) {
    const A = config.vertices[aIdx];
    const B = config.vertices[bIdx];
    const hA = A.handles[dirAB] || defaultHandleFor(...Object.values(ij(aIdx)), dirAB);
    const hB = B.handles[dirBA] || defaultHandleFor(...Object.values(ij(bIdx)), dirBA);
    const [ax, ay] = meshToDom(A.position[0], A.position[1]);
    const [bx, by] = meshToDom(B.position[0], B.position[1]);
    const [c1x, c1y] = meshToDom(A.position[0] + hA[0], A.position[1] + hA[1]);
    const [c2x, c2y] = meshToDom(B.position[0] + hB[0], B.position[1] + hB[1]);
    return `M ${ax} ${ay} C ${c1x} ${c1y}, ${c2x} ${c2y}, ${bx} ${by}`;
  }

  // ---------- drag handles ----------
  function renderHandles() {
    dragLayer.innerHTML = '';
    // Node circles are hideable via the 'Show nodes' toggle so the gradient
    // can be previewed without UI chrome. Selection still works through the
    // sidebar's grid picker; tangent handles continue to render normally so
    // an already-selected vertex remains editable.
    if (showNodes) {
      config.vertices.forEach((v, k) => {
        const h = document.createElement('div');
        h.className = 'node-handle' + (k === selectedVertexIndex ? ' selected' : '');
        h.style.background = v.color;
        h.dataset.idx = k;
        bindNodeDrag(h, k);
        dragLayer.appendChild(h);
      });
    }

    // Tangent handles for selected (or all, if toggled)
    const tangentSet = new Set();
    if (selectedVertexIndex !== null) tangentSet.add(selectedVertexIndex);
    if (showAllHandles) for (let k = 0; k < config.vertices.length; k++) tangentSet.add(k);
    tangentSet.forEach(k => {
      const v = config.vertices[k];
      ['e', 'w', 'n', 's'].forEach(dir => {
        if (!v.handles[dir]) return;
        const t = document.createElement('div');
        t.className = 'tangent-handle';
        t.dataset.idx = k;
        t.dataset.dir = dir;
        bindTangentDrag(t, k, dir);
        dragLayer.appendChild(t);
      });
    });

    positionHandles();
  }

  function positionHandles() {
    const nodes = dragLayer.querySelectorAll('.node-handle');
    nodes.forEach(n => {
      const k = +n.dataset.idx;
      const v = config.vertices[k];
      const [x, y] = meshToDom(v.position[0], v.position[1]);
      n.style.left = x + 'px';
      n.style.top  = y + 'px';
    });
    const tangents = dragLayer.querySelectorAll('.tangent-handle');
    tangents.forEach(t => {
      const k = +t.dataset.idx;
      const dir = t.dataset.dir;
      const v = config.vertices[k];
      const h = v.handles[dir];
      if (!h) { t.style.display = 'none'; return; }
      const [x, y] = meshToDom(v.position[0] + h[0], v.position[1] + h[1]);
      t.style.left = x + 'px';
      t.style.top  = y + 'px';
    });
  }

  function bindNodeDrag(el, k) {
    el.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      selectVertex(k);
      el.classList.add('dragging');
      const onMove = (ev) => {
        const [mx, my] = domToMesh(ev.clientX, ev.clientY);
        config.vertices[k].position = [mx, my];
        afterMutate();
      };
      const onUp = () => {
        el.classList.remove('dragging');
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        window.removeEventListener('pointercancel', onUp);
      };
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);
      window.addEventListener('pointercancel', onUp);
    });
  }

  function bindTangentDrag(el, k, dir) {
    el.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      selectVertex(k);
      el.classList.add('dragging');
      const onMove = (ev) => {
        const v = config.vertices[k];
        const [mx, my] = domToMesh(ev.clientX, ev.clientY);
        v.handles[dir] = [mx - v.position[0], my - v.position[1]];
        afterMutate();
      };
      const onUp = () => {
        el.classList.remove('dragging');
        window.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onUp);
        window.removeEventListener('pointercancel', onUp);
      };
      window.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);
      window.addEventListener('pointercancel', onUp);
    });
  }

  // Called after any mutation that affects rendering.
  function afterMutate() {
    positionHandles();
    renderWireframe();
    renderGridPicker();
    if (selectedVertexIndex !== null) syncDetailInputs();
    rebuildGradient();
  }

  // ---------- grid picker (4x4 swatch grid in the panel) ----------
  function renderGridPicker() {
    gridPicker.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;
    gridPicker.innerHTML = '';
    // Render in visual order: top row first (j = rows-1 down to 0)
    for (let j = config.rows - 1; j >= 0; j--) {
      for (let i = 0; i < config.cols; i++) {
        const k = vi(i, j);
        const v = config.vertices[k];
        const cell = document.createElement('div');
        cell.className = 'grid-cell' + (k === selectedVertexIndex ? ' selected' : '');
        cell.style.background = v.color;
        cell.title = `(${i}, ${j})`;
        cell.addEventListener('click', () => selectVertex(k));
        gridPicker.appendChild(cell);
      }
    }
  }

  // ---------- selection ----------
  function selectVertex(k) {
    selectedVertexIndex = k;
    renderHandles();
    renderWireframe();
    renderGridPicker();
    syncDetailPanel();
  }

  function syncDetailPanel() {
    const detail = $('node-detail');
    if (selectedVertexIndex === null) { detail.classList.add('hidden'); return; }
    detail.classList.remove('hidden');
    const { i, j } = ij(selectedVertexIndex);
    $('detail-title').textContent = `Vertex (${i}, ${j}) — #${selectedVertexIndex + 1}/16`;
    syncDetailInputs();
  }

  function syncDetailInputs() {
    if (selectedVertexIndex === null) return;
    const v = config.vertices[selectedVertexIndex];
    $('n-color').value = v.color;
    $('n-color-hex').value = v.color;
    setRange('n-x',  v.position[0], n => n.toFixed(3));
    setRange('n-y',  v.position[1], n => n.toFixed(3));
    setRange('n-ix', (v.introFrom || v.position)[0], n => n.toFixed(2));
    setRange('n-iy', (v.introFrom || v.position)[1], n => n.toFixed(2));
    setRange('n-ox', (v.outroTo   || v.position)[0], n => n.toFixed(2));
    setRange('n-oy', (v.outroTo   || v.position)[1], n => n.toFixed(2));
    // Handle rows
    document.querySelectorAll('.handle-row').forEach(row => {
      const dir = row.dataset.dir;
      const h = v.handles[dir];
      const [xi, yi] = row.querySelectorAll('input');
      if (h === null) {
        row.classList.add('disabled');
        xi.value = ''; yi.value = '';
      } else {
        row.classList.remove('disabled');
        xi.value = h[0].toFixed(3);
        yi.value = h[1].toFixed(3);
      }
    });
  }

  function setRange(id, val, fmt) {
    $(id).value = val;
    const valEl = $(id + '-val');
    valEl.value = fmt ? fmt(val) : Number(val).toFixed(2);
  }

  // ---------- detail-panel bindings ----------
  function bindDetailInputs() {
    const onColor = (e) => {
      if (selectedVertexIndex === null) return;
      const v = e.target.value;
      config.vertices[selectedVertexIndex].color = v;
      $('n-color').value = v; $('n-color-hex').value = v;
      afterMutate();
    };
    $('n-color').addEventListener('input', onColor);
    $('n-color-hex').addEventListener('change', onColor);

    const bindXY = (id, target, idx, idxOnVertex = null) => {
      const apply = (raw) => {
        if (selectedVertexIndex === null) return;
        const n = parseFloat(raw);
        if (!Number.isFinite(n)) return;
        const v = config.vertices[selectedVertexIndex];
        if (idxOnVertex) {
          // introFrom / outroTo are arrays — make sure they exist
          if (!v[idxOnVertex]) v[idxOnVertex] = v.position.slice();
          v[idxOnVertex][idx] = n;
        } else {
          v[target][idx] = n;
        }
        $(id).value = n;
        $(id + '-val').value = n.toFixed(target === 'position' ? 3 : 2);
        afterMutate();
      };
      $(id).addEventListener('input', (e) => apply(e.target.value));
      $(id + '-val').addEventListener('change', (e) => apply(e.target.value));
    };
    bindXY('n-x',  'position', 0);
    bindXY('n-y',  'position', 1);
    bindXY('n-ix', null, 0, 'introFrom');
    bindXY('n-iy', null, 1, 'introFrom');
    bindXY('n-ox', null, 0, 'outroTo');
    bindXY('n-oy', null, 1, 'outroTo');

    // Handle inputs
    document.querySelectorAll('.handle-row').forEach(row => {
      const dir = row.dataset.dir;
      const [xi, yi] = row.querySelectorAll('input');
      const applyHandle = () => {
        if (selectedVertexIndex === null) return;
        const v = config.vertices[selectedVertexIndex];
        if (v.handles[dir] === null) return;
        const x = parseFloat(xi.value), y = parseFloat(yi.value);
        if (!Number.isFinite(x) || !Number.isFinite(y)) return;
        v.handles[dir] = [x, y];
        afterMutate();
      };
      xi.addEventListener('change', applyHandle);
      yi.addEventListener('change', applyHandle);
      row.querySelector('.reset').addEventListener('click', () => {
        if (selectedVertexIndex === null) return;
        const { i, j } = ij(selectedVertexIndex);
        const def = defaultHandleFor(i, j, dir);
        if (def === null) return;
        config.vertices[selectedVertexIndex].handles[dir] = def;
        afterMutate();
      });
    });
  }

  // ---------- global bindings ----------
  function bindGlobalInputs() {
    const onBg = (e) => {
      const v = e.target.value;
      config.bgColor = v;
      $('bg-color').value = v; $('bg-color-hex').value = v;
      rebuildGradient();
    };
    $('bg-color').addEventListener('input', onBg);
    $('bg-color-hex').addEventListener('change', onBg);

    const bindNumeric = (id, key, parse = parseFloat, fmt = (v) => v.toFixed(2)) => {
      const apply = (raw) => {
        const v = parse(raw);
        if (!Number.isFinite(v)) return;
        config[key] = v;
        $(id).value = v;
        $(id + '-val').value = fmt(v);
        rebuildGradient();
      };
      $(id).addEventListener('input', (e) => apply(e.target.value));
      $(id + '-val').addEventListener('change', (e) => apply(e.target.value));
    };
    bindNumeric('intro-dur',   'introDuration',  parseInt,   v => v.toString());
    bindNumeric('outro-dur',   'outroDuration',  parseInt,   v => v.toString());
    // Float amplitude/speed are kept in config (used by the renderer) but
    // are not exposed in the editor UI — too niche to be worth a control.

    $('play-intro').addEventListener('click', () => rebuildGradient(false));
    $('play-outro').addEventListener('click', () => {
      if (gradient) gradient.playOutro();
      setTimeout(() => rebuildGradient(), (config.outroDuration + config.vertices.length * 40) + 200);
    });

    $('show-nodes').addEventListener('change', (e) => {
      showNodes = e.target.checked;
      renderHandles();
    });
    $('show-wireframe').addEventListener('change', (e) => {
      showWireframe = e.target.checked;
      renderWireframe();
    });
    $('show-all-handles').addEventListener('change', (e) => {
      showAllHandles = e.target.checked;
      renderHandles();
      renderWireframe();
    });

  }

  // ---------- export ----------
  function formatConfig() {
    // Compact JSON-ish JS literal of the vertices array.
    const verts = config.vertices.map(v => {
      const h = v.handles;
      const hStr = JSON.stringify({
        e: h.e, w: h.w, n: h.n, s: h.s,
      }).replace(/"([ewns])":/g, '$1:');
      return `    { color: '${v.color}', position: [${v.position[0].toFixed(3)}, ${v.position[1].toFixed(3)}], ` +
        `handles: ${hStr}, ` +
        `introFrom: [${v.introFrom[0].toFixed(2)}, ${v.introFrom[1].toFixed(2)}], ` +
        `outroTo: [${v.outroTo[0].toFixed(2)}, ${v.outroTo[1].toFixed(2)}] },`;
    }).join('\n');
    return `const gradient = new MeshGradient({
  bgColor: '${config.bgColor}',
  introDuration: ${config.introDuration},
  outroDuration: ${config.outroDuration},
  floatAmplitude: ${config.floatAmplitude.toFixed(3)},
  floatSpeed: ${config.floatSpeed.toFixed(5)},
  rows: ${config.rows},
  cols: ${config.cols},
  vertices: [
${verts}
  ],
});

gradient.playIntro();`;
  }

  function bindExport() {
    $('export-btn').addEventListener('click', () => {
      $('export-text').value = formatConfig();
      $('export-modal').classList.add('open');
    });
    $('close-modal').addEventListener('click', () => $('export-modal').classList.remove('open'));
    $('copy-btn').addEventListener('click', async () => {
      const t = $('export-text');
      t.select();
      try {
        await navigator.clipboard.writeText(t.value);
        $('copy-btn').textContent = 'Copied';
        setTimeout(() => { $('copy-btn').textContent = 'Copy'; }, 1200);
      } catch { document.execCommand('copy'); }
    });
    $('reset-btn').addEventListener('click', () => {
      if (!confirm('Reset all settings to defaults?')) return;
      config = structuredClone(defaultConfig);
      selectedVertexIndex = null;
      syncGlobalInputs();
      renderHandles(); renderWireframe(); renderGridPicker(); syncDetailPanel();
      rebuildGradient();
    });
  }

  function syncGlobalInputs() {
    $('bg-color').value = config.bgColor;
    $('bg-color-hex').value = config.bgColor;
    setRange('intro-dur',   config.introDuration,  v => String(v));
    setRange('outro-dur',   config.outroDuration,  v => String(v));
  }

  // ---------- resize handling ----------
  window.addEventListener('resize', () => {
    positionHandles();
    renderWireframe();
  });

  // ---------- URL-hash sharing ----------
  // Pack the full config into the location hash so any URL captures the
  // gradient. Uses native CompressionStream (deflate-raw) + base64url —
  // no dependencies, ~1KB encoded for a typical config. We serialize ALL
  // fields explicitly (no relying on defaults) so loading a shared URL on
  // a future version reproduces the exact saved state.

  // Compact key names just to shave bytes. The semantic shape matches what
  // expandConfig() rebuilds before handing it to MeshGradient.
  function compactConfig(c) {
    return {
      bg: c.bgColor,
      i: c.introDuration,
      o: c.outroDuration,
      a: c.floatAmplitude,
      s: c.floatSpeed,
      r: c.rows,
      cols: c.cols,
      v: c.vertices.map(v => ({
        p: v.position,
        c: v.color,
        h: [v.handles.e, v.handles.w, v.handles.n, v.handles.s],
        i: v.introFrom,
        o: v.outroTo,
      })),
    };
  }
  function expandConfig(d) {
    return {
      bgColor: d.bg,
      introDuration:  d.i,
      outroDuration:  d.o,
      floatAmplitude: d.a,
      floatSpeed:     d.s,
      rows: d.r,
      cols: d.cols,
      vertices: d.v.map(v => ({
        position: v.p,
        color: v.c,
        handles: { e: v.h[0], w: v.h[1], n: v.h[2], s: v.h[3] },
        introFrom: v.i,
        outroTo:   v.o,
      })),
    };
  }

  async function deflateBase64Url(str) {
    const stream = new Blob([str]).stream().pipeThrough(new CompressionStream('deflate-raw'));
    const buf = await new Response(stream).arrayBuffer();
    // btoa expects a binary string. Chunked to dodge call-stack limits on huge inputs,
    // though for our payload sizes it's fine in one shot.
    let bin = '';
    const bytes = new Uint8Array(buf);
    for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  }
  async function inflateBase64Url(b64u) {
    let b64 = b64u.replace(/-/g, '+').replace(/_/g, '/');
    while (b64.length % 4) b64 += '=';
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('deflate-raw'));
    return new Response(stream).text();
  }

  async function buildShareUrl() {
    const encoded = await deflateBase64Url(JSON.stringify(compactConfig(config)));
    return location.origin + location.pathname + '#g=' + encoded;
  }

  // On boot: if the URL has #g=..., decode it and use that as the initial state.
  // Bad/corrupted hashes are ignored — we just fall through to defaults.
  async function loadFromHash() {
    const m = (location.hash || '').match(/g=([A-Za-z0-9_\-]+)/);
    if (!m) return false;
    try {
      const json = await inflateBase64Url(m[1]);
      const data = JSON.parse(json);
      config = expandConfig(data);
      return true;
    } catch (e) {
      console.warn('Failed to decode gradient from URL:', e);
      return false;
    }
  }

  // Auto-sync the hash whenever state changes so the address bar always
  // reflects the current gradient (copy-from-URL-bar workflow). Debounced
  // to avoid thrashing during drags. replaceState avoids back-button noise.
  let _hashTimer = null;
  function scheduleHashUpdate() {
    clearTimeout(_hashTimer);
    _hashTimer = setTimeout(async () => {
      try {
        const url = await buildShareUrl();
        const hash = '#' + url.split('#')[1];
        history.replaceState(null, '', hash);
      } catch (e) { /* ignore */ }
    }, 400);
  }

  // Wrap rebuildGradient so every state change triggers a hash refresh.
  const _origRebuild = rebuildGradient;
  rebuildGradient = function(...args) {
    _origRebuild.apply(this, args);
    scheduleHashUpdate();
  };

  function bindShare() {
    $('share-btn').addEventListener('click', async () => {
      const btn = $('share-btn');
      try {
        const url = await buildShareUrl();
        await navigator.clipboard.writeText(url);
        const orig = btn.textContent;
        btn.textContent = 'Copied — paste anywhere';
        setTimeout(() => { btn.textContent = orig; }, 1600);
      } catch (e) {
        console.error(e);
        btn.textContent = 'Copy failed';
        setTimeout(() => { btn.textContent = 'Copy share link'; }, 1600);
      }
    });
  }

  // ---------- boot ----------
  await loadFromHash();
  syncGlobalInputs();
  bindGlobalInputs();
  bindDetailInputs();
  bindExport();
  bindShare();
  renderHandles();
  renderWireframe();
  renderGridPicker();
  rebuildGradient();

  // Live wireframe & handle tracking during floating (handles follow drift).
  // Kept off by default — the handles staying pinned to "home" is more useful
  // for editing. Flip this if you want the handles to track the floating motion.
  // setInterval(positionHandles, 16);

  window._gradient = () => gradient;
  window._config = () => config;
</script>
</body>
</html>
