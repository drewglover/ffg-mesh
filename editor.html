<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mesh gradient editor</title>
<style>
  /* Reset + base */
  html, body { margin: 0; padding: 0; height: 100vh; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif; color: white; }

  /* The gradient canvas sits at z-index -1 (set by the module itself).
     This wrapper provides a solid bg so the canvas has something to composite against. */
  #bg-color-source { position: fixed; inset: 0; z-index: -2; background: #0a0a14; }

  /* The drag layer sits over the whole viewport at z-index 1, capturing node drags. */
  #drag-layer { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  .node-handle {
    position: absolute; width: 32px; height: 32px; margin: -16px 0 0 -16px;
    border: 2px solid white; border-radius: 50%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.4), inset 0 0 0 2px rgba(0,0,0,0.5);
    cursor: grab; pointer-events: auto;
    transition: transform 0.15s;
  }
  .node-handle:hover { transform: scale(1.15); }
  .node-handle.dragging { cursor: grabbing; transform: scale(1.25); }
  .node-handle.selected { box-shadow: 0 0 0 3px white, 0 2px 12px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(0,0,0,0.5); }
  .node-label {
    position: absolute; top: 36px; left: 50%; transform: translateX(-50%);
    font-size: 11px; font-weight: 500; background: rgba(0,0,0,0.7); padding: 2px 6px;
    border-radius: 3px; white-space: nowrap; pointer-events: none;
  }
  /* Visual hint of node's influence radius, shown only when selected. */
  .radius-ring {
    position: absolute; border: 1px dashed rgba(255,255,255,0.4); border-radius: 50%;
    pointer-events: none; transform: translate(-50%, -50%);
  }

  /* Side panel */
  #panel {
    position: fixed; top: 16px; right: 16px; bottom: 16px; width: 320px; z-index: 10;
    background: rgba(20, 20, 30, 0.85); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #panel.collapsed { width: 44px; }
  #panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
  }
  #panel-title { font-size: 13px; font-weight: 500; letter-spacing: 0.02em; }
  #panel.collapsed #panel-title, #panel.collapsed #panel-body { display: none; }
  #collapse-btn {
    background: none; border: none; color: white; cursor: pointer; padding: 4px 8px;
    font-size: 16px; opacity: 0.6;
  }
  #collapse-btn:hover { opacity: 1; }
  #panel-body { padding: 12px 16px 20px; overflow-y: auto; flex: 1; }

  /* Sections */
  .section { margin-bottom: 18px; }
  .section-title {
    font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em;
    opacity: 0.55; margin: 0 0 8px;
  }

  /* Form rows */
  .row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
  .row label { flex: 0 0 70px; opacity: 0.7; }
  .row input[type="range"] { flex: 1; min-width: 0; }
  .row .val {
    flex: 0 0 56px; text-align: right; font-variant-numeric: tabular-nums; opacity: 0.85;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    color: white; padding: 3px 6px; border-radius: 4px; font: inherit; font-size: 12px;
    -moz-appearance: textfield;
  }
  .row .val::-webkit-outer-spin-button, .row .val::-webkit-inner-spin-button {
    -webkit-appearance: none; margin: 0;
  }
  .row .val:focus { outline: none; border-color: rgba(120, 150, 255, 0.6); opacity: 1; }
  .row input[type="text"], .row input[type="number"] {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
    color: white; padding: 5px 8px; border-radius: 4px; font: inherit;
  }
  .row input[type="color"] { width: 40px; height: 24px; padding: 0; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 4px; background: none; cursor: pointer; }

  /* Node list */
  .node-row {
    display: flex; align-items: center; gap: 8px; padding: 6px 8px;
    background: rgba(255,255,255,0.04); border: 1px solid transparent; border-radius: 6px;
    margin-bottom: 4px; cursor: pointer;
  }
  .node-row:hover { background: rgba(255,255,255,0.08); }
  .node-row.selected { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.1); }
  .node-row .swatch { width: 20px; height: 20px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0; }
  .node-row .name { flex: 1; font-size: 12px; }
  .node-row .pos { font-size: 11px; opacity: 0.5; font-variant-numeric: tabular-nums; }
  .node-row .delete {
    background: none; border: none; color: white; opacity: 0.4; cursor: pointer; font-size: 14px; padding: 2px 6px;
  }
  .node-row .delete:hover { opacity: 1; color: #ff8080; }

  /* Buttons */
  button.btn {
    background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.12);
    padding: 7px 12px; border-radius: 6px; font: inherit; font-size: 12px; cursor: pointer;
  }
  button.btn:hover { background: rgba(255,255,255,0.14); }
  button.btn.primary { background: rgba(100, 130, 255, 0.3); border-color: rgba(120, 150, 255, 0.5); }
  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

  /* Per-node detail editor (shown when a node is selected) */
  #node-detail { background: rgba(255,255,255,0.04); border-radius: 8px; padding: 10px; margin-bottom: 12px; }
  #node-detail.hidden { display: none; }
  #node-detail .section-title { margin-top: 10px; }
  #node-detail .section-title:first-child { margin-top: 0; }

  /* Export modal */
  #export-modal {
    position: fixed; inset: 0; z-index: 100; display: none;
    align-items: center; justify-content: center; background: rgba(0,0,0,0.6);
  }
  #export-modal.open { display: flex; }
  .modal-card {
    background: #1a1a26; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
    padding: 20px; width: min(640px, 90vw); max-height: 80vh; display: flex; flex-direction: column;
  }
  .modal-card h3 { margin: 0 0 12px; font-size: 14px; font-weight: 500; }
  .modal-card textarea {
    flex: 1; min-height: 320px; width: 100%; box-sizing: border-box;
    font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; line-height: 1.5;
    background: rgba(0,0,0,0.4); color: #c8e0ff; border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px; padding: 12px; resize: vertical;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }

  /* Bottom action bar */
  #bottom-bar {
    position: fixed; left: 16px; bottom: 16px; z-index: 10; display: flex; gap: 8px;
    background: rgba(20,20,30,0.85); backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 8px;
  }
</style>
</head>
<body>

<!-- Base solid color that the gradient canvas composites over.
     We swap this color in tandem with the gradient's bgColor so they always match. -->
<div id="bg-color-source"></div>

<!-- Layer with draggable handles, one per gradient node. -->
<div id="drag-layer"></div>

<!-- Right-side editor panel -->
<aside id="panel">
  <header id="panel-header">
    <span id="panel-title">Mesh gradient editor</span>
    <button id="collapse-btn" title="Collapse">⇄</button>
  </header>
  <div id="panel-body">
    <!-- Global settings -->
    <div class="section">
      <div class="section-title">Background</div>
      <div class="row">
        <label>Color</label>
        <input type="color" id="bg-color" value="#0a0a14">
        <input type="text" id="bg-color-hex" value="#0a0a14" style="max-width: 90px;">
      </div>
    </div>

    <div class="section">
      <div class="section-title">Animation</div>
      <div class="row"><label>Intro</label><input type="range" id="intro-dur" min="200" max="5000" step="100" value="1800"><input type="number" class="val" id="intro-dur-val" min="0" max="20000" step="100" value="1800"></div>
      <div class="row"><label>Outro</label><input type="range" id="outro-dur" min="200" max="5000" step="100" value="1400"><input type="number" class="val" id="outro-dur-val" min="0" max="20000" step="100" value="1400"></div>
      <div class="row"><label>Float amp</label><input type="range" id="float-amp" min="0" max="0.2" step="0.005" value="0.06"><input type="number" class="val" id="float-amp-val" min="0" max="1" step="0.005" value="0.06"></div>
      <div class="row"><label>Float speed</label><input type="range" id="float-speed" min="0" max="0.001" step="0.00002" value="0.00018"><input type="number" class="val" id="float-speed-val" min="0" max="0.01" step="0.00001" value="0.00018"></div>
      <div class="btn-row">
        <button class="btn" id="play-intro">Play intro</button>
        <button class="btn" id="play-outro">Play outro</button>
      </div>
    </div>

    <!-- Per-node detail editor (appears when a node is selected) -->
    <div id="node-detail" class="hidden">
      <div class="section-title" id="detail-title">Node</div>
      <div class="row">
        <label>Color</label>
        <input type="color" id="n-color">
        <input type="text" id="n-color-hex" style="max-width: 90px;">
      </div>
      <div class="row"><label>X</label><input type="range" id="n-x" min="-0.3" max="1.3" step="0.01"><input type="number" class="val" id="n-x-val" min="-2" max="2" step="0.01"></div>
      <div class="row"><label>Y</label><input type="range" id="n-y" min="-0.3" max="1.3" step="0.01"><input type="number" class="val" id="n-y-val" min="-2" max="2" step="0.01"></div>
      <div class="row"><label>Radius</label><input type="range" id="n-r" min="0.1" max="1.5" step="0.01"><input type="number" class="val" id="n-r-val" min="0.01" max="5" step="0.01"></div>
      <div class="section-title" style="margin-top: 12px;">Intro from</div>
      <div class="row"><label>X</label><input type="range" id="n-ix" min="-0.5" max="1.5" step="0.01"><input type="number" class="val" id="n-ix-val" min="-2" max="2" step="0.01"></div>
      <div class="row"><label>Y</label><input type="range" id="n-iy" min="-0.5" max="1.5" step="0.01"><input type="number" class="val" id="n-iy-val" min="-2" max="2" step="0.01"></div>
      <div class="section-title" style="margin-top: 12px;">Outro to</div>
      <div class="row"><label>X</label><input type="range" id="n-ox" min="-0.5" max="1.5" step="0.01"><input type="number" class="val" id="n-ox-val" min="-2" max="2" step="0.01"></div>
      <div class="row"><label>Y</label><input type="range" id="n-oy" min="-0.5" max="1.5" step="0.01"><input type="number" class="val" id="n-oy-val" min="-2" max="2" step="0.01"></div>
    </div>

    <!-- Node list -->
    <div class="section">
      <div class="section-title">Nodes <span style="opacity: 0.4; font-weight: 400; text-transform: none; letter-spacing: 0;">(drag handles or click row)</span></div>
      <div id="node-list"></div>
      <div class="btn-row">
        <button class="btn" id="add-node">+ Add node</button>
      </div>
    </div>
  </div>
</aside>

<!-- Bottom export bar -->
<div id="bottom-bar">
  <button class="btn primary" id="export-btn">Export config</button>
  <button class="btn" id="reset-btn">Reset</button>
</div>

<!-- Export modal -->
<div id="export-modal">
  <div class="modal-card">
    <h3>Config — paste into your <code>MeshGradient</code> constructor</h3>
    <textarea id="export-text" readonly></textarea>
    <div class="modal-actions">
      <button class="btn" id="copy-btn">Copy</button>
      <button class="btn" id="close-modal">Close</button>
    </div>
  </div>
</div>

<script type="module">
  import { MeshGradient } from './mesh-gradient.js';

  // ---------- Initial state ----------
  // This is the same default config the underlying module ships with, mirrored
  // here so the editor controls it explicitly.
  const gradient = new MeshGradient({
    bgColor: '#f7f5f1',
    introDuration: 1800,
    outroDuration: 1400,
    floatAmplitude: 0.030,
    floatSpeed: 0.00018,
    nodes: [
      { color: '#F3DDBE', position: [0.130, 1.020], radius: 0.120, introFrom: [0.150, 1.030], outroTo: [0.150, 1.030] },
      { color: '#25dce9', position: [-0.080, 0.830], radius: 0.260, introFrom: [-0.080, 0.830], outroTo: [-0.080, 0.830] },
      { color: '#263759', position: [0.007, 0.971], radius: 0.500, introFrom: [0.010, 0.970], outroTo: [0.010, 0.970] },
      { color: '#f7f5f1', position: [0.127, 0.797], radius: 0.100, introFrom: [0.500, -0.300], outroTo: [0.500, 1.300] },
    ],
  });

  // We deep-clone so resets work cleanly.
  let config = structuredClone(defaultConfig);
  let selectedNodeIndex = null;
  let gradient = null;

  // ---------- Gradient lifecycle ----------
  // Rebuilding the whole instance on every parameter change is simplest and
  // perfectly fast — WebGL context creation is cheap and the underlying module
  // doesn't expose setters.
  function rebuildGradient(skipIntro = true) {
    if (gradient) {
      // Remove the previous canvas.
      gradient.canvas.remove();
      gradient.state = 'done'; // stop its render loop
    }
    gradient = new MeshGradient(structuredClone(config));
    if (skipIntro) {
      // Skip the intro animation by jumping straight to floating state.
      gradient.state = 'floating';
      gradient.stateStart = performance.now();
    } else {
      gradient.playIntro();
    }
    if (!gradient._running) gradient._loop();
    // Bg color of the page wrapper tracks gradient bg so edges blend.
    document.getElementById('bg-color-source').style.background = config.bgColor;
  }

  // ---------- DOM refs ----------
  const $ = id => document.getElementById(id);
  const dragLayer = $('drag-layer');
  const nodeListEl = $('node-list');

  // ---------- Drag handles ----------
  // Re-render handles whenever the node list changes (add/remove/reorder/color).
  // Positions update in a separate cheap loop so dragging is smooth.
  function renderHandles() {
    dragLayer.innerHTML = '';
    config.nodes.forEach((node, i) => {
      const ring = document.createElement('div');
      ring.className = 'radius-ring';
      ring.dataset.idx = i;

      const handle = document.createElement('div');
      handle.className = 'node-handle' + (i === selectedNodeIndex ? ' selected' : '');
      handle.style.background = node.color;
      handle.dataset.idx = i;

      const label = document.createElement('span');
      label.className = 'node-label';
      label.textContent = i + 1;
      handle.appendChild(label);

      // Click to select. We don't select on drag-start because that would
      // collide with rapid drags; the drag handler also calls select() so
      // selection still updates correctly when grabbing.
      handle.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        selectNode(i);
        handle.classList.add('dragging');
        // Listen on window — not on the handle — so fast drags that briefly
        // overshoot the 32px handle don't drop the pointer mid-drag.
        const onMove = (ev) => {
          // Convert viewport pixels to normalized 0..1.
          const x = ev.clientX / window.innerWidth;
          // y is flipped because WebGL has origin at bottom-left but DOM at top-left.
          const y = 1 - (ev.clientY / window.innerHeight);
          config.nodes[i].position = [x, y];
          updateNodeListRow(i);
          if (i === selectedNodeIndex) syncDetailInputs();
          positionHandles();
          rebuildGradient();
        };
        const onUp = () => {
          handle.classList.remove('dragging');
          window.removeEventListener('pointermove', onMove);
          window.removeEventListener('pointerup', onUp);
          window.removeEventListener('pointercancel', onUp);
        };
        window.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        window.addEventListener('pointercancel', onUp);
      });

      dragLayer.appendChild(ring);
      dragLayer.appendChild(handle);
    });
    positionHandles();
  }

  // Position both handles and radius rings based on current node config.
  // Called on every animation frame so handles track floating motion.
  function positionHandles() {
    const W = window.innerWidth, H = window.innerHeight;
    const handles = dragLayer.querySelectorAll('.node-handle');
    const rings = dragLayer.querySelectorAll('.radius-ring');
    handles.forEach((h, i) => {
      const node = config.nodes[i];
      if (!node) return;
      const x = node.position[0] * W;
      const y = (1 - node.position[1]) * H; // flip y for DOM
      h.style.left = x + 'px';
      h.style.top = y + 'px';
      // Show the radius ring only for the selected node.
      const ring = rings[i];
      if (i === selectedNodeIndex) {
        // Radius is in "shortest side" units in the shader, so convert here too.
        const rPx = node.radius * Math.min(W, H);
        ring.style.display = 'block';
        ring.style.left = x + 'px';
        ring.style.top = y + 'px';
        ring.style.width = (rPx * 2) + 'px';
        ring.style.height = (rPx * 2) + 'px';
      } else {
        ring.style.display = 'none';
      }
    });
  }

  // Drive handle position updates from rAF so they track floating drift.
  // Note: this means handles visually move during floating state. If you'd
  // rather the handles stayed pinned at the "home" position, just call
  // positionHandles() once instead of in a loop.
  // Actually — for editing, pinning them to home is more useful. Doing that:
  // (The render loop is removed; we just call positionHandles on resize and updates.)
  window.addEventListener('resize', positionHandles);

  // ---------- Node list panel ----------
  function renderNodeList() {
    nodeListEl.innerHTML = '';
    config.nodes.forEach((node, i) => {
      const row = document.createElement('div');
      row.className = 'node-row' + (i === selectedNodeIndex ? ' selected' : '');
      row.innerHTML = `
        <div class="swatch" style="background: ${node.color}"></div>
        <span class="name">Node ${i + 1}</span>
        <span class="pos">${node.position[0].toFixed(2)}, ${node.position[1].toFixed(2)}</span>
        <button class="delete" title="Delete">×</button>
      `;
      row.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete')) return;
        selectNode(i);
      });
      row.querySelector('.delete').addEventListener('click', (e) => {
        e.stopPropagation();
        if (config.nodes.length <= 1) return; // keep at least one
        config.nodes.splice(i, 1);
        if (selectedNodeIndex === i) selectedNodeIndex = null;
        else if (selectedNodeIndex > i) selectedNodeIndex--;
        renderNodeList();
        renderHandles();
        syncDetailPanel();
        rebuildGradient();
      });
      nodeListEl.appendChild(row);
    });
  }
  function updateNodeListRow(i) {
    // Cheap: just re-render the list. Could be optimized but it's <20 nodes.
    renderNodeList();
  }

  // ---------- Selection / detail panel ----------
  function selectNode(i) {
    selectedNodeIndex = i;
    renderNodeList();
    renderHandles();
    syncDetailPanel();
  }
  function syncDetailPanel() {
    const detail = $('node-detail');
    if (selectedNodeIndex === null || !config.nodes[selectedNodeIndex]) {
      detail.classList.add('hidden');
      return;
    }
    detail.classList.remove('hidden');
    $('detail-title').textContent = `Node ${selectedNodeIndex + 1}`;
    syncDetailInputs();
  }
  function syncDetailInputs() {
    const n = config.nodes[selectedNodeIndex];
    if (!n) return;
    $('n-color').value = n.color;
    $('n-color-hex').value = n.color;
    const f2 = (v) => Number(v).toFixed(2);
    setRange('n-x',  n.position[0],  f2);
    setRange('n-y',  n.position[1],  f2);
    setRange('n-r',  n.radius,       f2);
    setRange('n-ix', n.introFrom[0], f2);
    setRange('n-iy', n.introFrom[1], f2);
    setRange('n-ox', n.outroTo[0],   f2);
    setRange('n-oy', n.outroTo[1],   f2);
  }
  // Sync slider + numeric input + config. Pass fmt for the input display
  // (so e.g. 0.06 doesn't show as 0.0600000001).
  function setRange(id, val, fmt) {
    $(id).value = val;
    const valEl = $(id + '-val');
    if (fmt) valEl.value = fmt(val);
    else valEl.value = Number(val).toFixed(2);
  }

  // Bind detail-panel inputs to mutate the selected node.
  function bindDetailInputs() {
    const onColor = (e) => {
      if (selectedNodeIndex === null) return;
      const v = e.target.value;
      config.nodes[selectedNodeIndex].color = v;
      $('n-color').value = v; $('n-color-hex').value = v;
      renderNodeList(); renderHandles();
      rebuildGradient();
    };
    $('n-color').addEventListener('input', onColor);
    $('n-color-hex').addEventListener('change', onColor);

    // Wire both the slider AND the numeric input box for a single field.
    // Slider drag -> updates input box + config. Typing in box -> updates slider + config.
    // We use 'input' on the slider (for live response) and 'change' on the box
    // (so we don't fire mid-typing while the user is still entering digits).
    const bindXY = (id, target, idx) => {
      const apply = (raw) => {
        if (selectedNodeIndex === null) return;
        const v = parseFloat(raw);
        if (!Number.isFinite(v)) return;
        config.nodes[selectedNodeIndex][target][idx] = v;
        $(id).value = v;
        $(id + '-val').value = v.toFixed(2);
        renderNodeList(); positionHandles();
        rebuildGradient();
      };
      $(id).addEventListener('input', (e) => apply(e.target.value));
      $(id + '-val').addEventListener('change', (e) => apply(e.target.value));
    };
    bindXY('n-x',  'position',  0);
    bindXY('n-y',  'position',  1);
    bindXY('n-ix', 'introFrom', 0);
    bindXY('n-iy', 'introFrom', 1);
    bindXY('n-ox', 'outroTo',   0);
    bindXY('n-oy', 'outroTo',   1);

    const applyRadius = (raw) => {
      if (selectedNodeIndex === null) return;
      const v = parseFloat(raw);
      if (!Number.isFinite(v) || v <= 0) return;
      config.nodes[selectedNodeIndex].radius = v;
      $('n-r').value = v;
      $('n-r-val').value = v.toFixed(2);
      positionHandles();
      rebuildGradient();
    };
    $('n-r').addEventListener('input', (e) => applyRadius(e.target.value));
    $('n-r-val').addEventListener('change', (e) => applyRadius(e.target.value));
  }

  // ---------- Global controls ----------
  function bindGlobalInputs() {
    const onBg = (e) => {
      const v = e.target.value;
      config.bgColor = v;
      $('bg-color').value = v; $('bg-color-hex').value = v;
      rebuildGradient();
    };
    $('bg-color').addEventListener('input', onBg);
    $('bg-color-hex').addEventListener('change', onBg);

    // Bidirectional slider <-> input box, same pattern as detail panel.
    const bindNumeric = (id, key, parse = parseFloat, fmt = (v) => v.toFixed(2)) => {
      const apply = (raw) => {
        const v = parse(raw);
        if (!Number.isFinite(v)) return;
        config[key] = v;
        $(id).value = v;
        $(id + '-val').value = fmt(v);
        rebuildGradient();
      };
      $(id).addEventListener('input', (e) => apply(e.target.value));
      $(id + '-val').addEventListener('change', (e) => apply(e.target.value));
    };
    bindNumeric('intro-dur',   'introDuration',  parseInt, v => v.toString());
    bindNumeric('outro-dur',   'outroDuration',  parseInt, v => v.toString());
    bindNumeric('float-amp',   'floatAmplitude', parseFloat, v => v.toFixed(3));
    bindNumeric('float-speed', 'floatSpeed',     parseFloat, v => v.toFixed(5));

    $('play-intro').addEventListener('click', () => {
      rebuildGradient(false); // don't skip — actually play
    });
    $('play-outro').addEventListener('click', () => {
      if (gradient) gradient.playOutro();
      // After outro completes the canvas will go blank. Auto-rebuild after.
      setTimeout(() => rebuildGradient(), (config.outroDuration + config.nodes.length * 80) + 200);
    });

    $('add-node').addEventListener('click', () => {
      // Drop a new node near center with a random color.
      const colors = ['#FF6B9D', '#C147E9', '#FFA45B', '#3D5AFE', '#5BFFC8', '#FFE45B', '#FF5B5B', '#5B8AFF'];
      const color = colors[config.nodes.length % colors.length];
      config.nodes.push({
        color,
        position: [0.5 + (Math.random() - 0.5) * 0.4, 0.5 + (Math.random() - 0.5) * 0.4],
        radius: 0.5,
        introFrom: [0.5, -0.3],
        outroTo: [0.5, 1.3],
      });
      renderNodeList(); renderHandles();
      selectNode(config.nodes.length - 1);
      rebuildGradient();
    });

    $('collapse-btn').addEventListener('click', () => {
      $('panel').classList.toggle('collapsed');
    });
  }

  // ---------- Export ----------
  function formatConfig() {
    // Produce JS that can be pasted directly into `new MeshGradient({...})`.
    const nodeLines = config.nodes.map(n =>
      `    { color: '${n.color}', position: [${n.position[0].toFixed(3)}, ${n.position[1].toFixed(3)}], ` +
      `radius: ${n.radius.toFixed(3)}, ` +
      `introFrom: [${n.introFrom[0].toFixed(3)}, ${n.introFrom[1].toFixed(3)}], ` +
      `outroTo: [${n.outroTo[0].toFixed(3)}, ${n.outroTo[1].toFixed(3)}] },`
    ).join('\n');
    return `const gradient = new MeshGradient({
  bgColor: '${config.bgColor}',
  introDuration: ${config.introDuration},
  outroDuration: ${config.outroDuration},
  floatAmplitude: ${config.floatAmplitude.toFixed(3)},
  floatSpeed: ${config.floatSpeed.toFixed(5)},
  nodes: [
${nodeLines}
  ],
});

gradient.playIntro();`;
  }

  function bindExport() {
    $('export-btn').addEventListener('click', () => {
      $('export-text').value = formatConfig();
      $('export-modal').classList.add('open');
    });
    $('close-modal').addEventListener('click', () => $('export-modal').classList.remove('open'));
    $('copy-btn').addEventListener('click', async () => {
      const text = $('export-text');
      text.select();
      try {
        await navigator.clipboard.writeText(text.value);
        $('copy-btn').textContent = 'Copied';
        setTimeout(() => { $('copy-btn').textContent = 'Copy'; }, 1200);
      } catch {
        document.execCommand('copy'); // fallback
      }
    });
    $('reset-btn').addEventListener('click', () => {
      if (!confirm('Reset all settings to defaults?')) return;
      config = structuredClone(defaultConfig);
      selectedNodeIndex = null;
      syncGlobalInputs();
      renderNodeList(); renderHandles(); syncDetailPanel();
      rebuildGradient();
    });
  }

  function syncGlobalInputs() {
    $('bg-color').value = config.bgColor;
    $('bg-color-hex').value = config.bgColor;
    setRange('intro-dur',   config.introDuration,  v => String(v));
    setRange('outro-dur',   config.outroDuration,  v => String(v));
    setRange('float-amp',   config.floatAmplitude, v => v.toFixed(3));
    setRange('float-speed', config.floatSpeed,     v => v.toFixed(5));
  }

  // ---------- Boot ----------
  syncGlobalInputs();
  bindGlobalInputs();
  bindDetailInputs();
  bindExport();
  renderNodeList();
  renderHandles();
  rebuildGradient();

  // Expose for debugging.
  window._gradient = () => gradient;
  window._config = () => config;
</script>
</body>
</html>
