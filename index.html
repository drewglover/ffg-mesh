<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mesh gradient demo</title>
<style>
  /* Body background matches the gradient's bgColor so there's no flash at
     mount, and so the outro fades cleanly into the page instead of
     revealing a dark backdrop underneath. */
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: #f7f5f1; color: #1a1a26;
    font-family: system-ui, sans-serif;
  }
  main { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 4rem 2rem; }
  h1 { font-weight: 500; font-size: 2.5rem; margin: 0 0 1rem; }
  p { line-height: 1.6; opacity: 0.78; }
  button {
    margin-top: 2rem; padding: 0.75rem 1.5rem; font: inherit; font-size: 0.95rem;
    background: rgba(0,0,0,0.06); color: #1a1a26; border: 1px solid rgba(0,0,0,0.12);
    border-radius: 6px; cursor: pointer; backdrop-filter: blur(8px);
  }
  button:hover { background: rgba(0,0,0,0.1); }
</style>
</head>
<body>
<main>
  <h1>Mesh gradient demo</h1>
  <p>The background runs an intro animation on load, then drifts in a floating loop. Click the button to trigger the outro.</p>
  <button id="end">Play outro</button>
</main>
<script type="module">
  import { MeshGradient, defaultGrid } from './mesh-gradient.js';

  // Config shape matches what editor.html exports.
  //
  // - rows / cols define a fixed grid (4x4 by default). Each vertex carries
  //   a position [x, y] in 0..1, a hex color, four optional cubic-Bezier
  //   tangent handles { e, w, n, s } as offsets from position, and
  //   introFrom / outroTo positions used by the intro/outro animations.
  // - defaultGrid(rows, cols) returns a sensible 4-corner sunset palette
  //   with straight default handles — swap it for a custom vertices array
  //   exported from the editor (Export button → JS literal), or load a
  //   shared gradient via the editor's URL hash.
  // - floatAmplitude / floatSpeed control the gentle drift on interior
  //   vertices once the intro finishes. The editor no longer exposes them
  //   in the UI but the renderer still uses them; tweak here if you want a
  //   different motion character.
  const gradient = new MeshGradient({
    bgColor: '#f7f5f1',
    introDuration: 1800,
    outroDuration: 1400,
    floatAmplitude: 0.025,
    floatSpeed: 0.00018,
    rows: 4,
    cols: 4,
    vertices: [
      { color: '#f7f5f1', position: [0.000, 0.000], handles: {e:[0.1111111111111111,0],w:null,n:[0,0.1111111111111111],s:null}, introFrom: [-0.30, -0.30], outroTo: [-0.30, -0.30] },
      { color: '#f7f5f1', position: [0.572, -0.045], handles: {e:[0.1111111111111111,0],w:[-0.1111111111111111,0],n:[0,0.1111111111111111],s:null}, introFrom: [0.33, -0.30], outroTo: [0.33, -0.30] },
      { color: '#f7f5f1', position: [0.865, -0.046], handles: {e:[0.1111111111111111,0],w:[-0.1111111111111111,0],n:[0,0.1111111111111111],s:null}, introFrom: [0.67, -0.30], outroTo: [0.67, -0.30] },
      { color: '#f7f5f1', position: [1.000, 0.000], handles: {e:null,w:[-0.1111111111111111,0],n:[0,0.1111111111111111],s:null}, introFrom: [1.30, -0.30], outroTo: [1.30, -0.30] },
      { color: '#f7f5f1', position: [0.000, 0.333], handles: {e:[0.1111111111111111,0],w:null,n:[0,0.1111111111111111],s:[0,-0.1111111111111111]}, introFrom: [-0.30, 0.33], outroTo: [-0.30, 0.33] },
      { color: '#f7f5f1', position: [0.527, 0.530], handles: {e:[0.1111111111111111,0],w:[-0.1111111111111111,0],n:[0,0.1111111111111111],s:[0,-0.1111111111111111]}, introFrom: [0.33, 0.33], outroTo: [0.33, 0.33] },
      { color: '#f7f5f1', position: [0.859, 0.391], handles: {e:[0.1111111111111111,0],w:[-0.1111111111111111,0],n:[0,0.1111111111111111],s:[0,-0.1111111111111111]}, introFrom: [0.67, 0.33], outroTo: [0.67, 0.33] },
      { color: '#f7f5f1', position: [1.025, 0.304], handles: {e:null,w:[-0.1111111111111111,0],n:[0,0.1111111111111111],s:[0,-0.1111111111111111]}, introFrom: [1.30, 0.33], outroTo: [1.30, 0.33] },
      { color: '#f7f5f1', position: [0.000, 0.667], handles: {e:[0.1111111111111111,0],w:null,n:[0,0.1111111111111111],s:[0,-0.1111111111111111]}, introFrom: [-0.30, 0.67], outroTo: [-0.30, 0.67] },
      { color: '#f7f5f1', position: [0.543, 0.852], handles: {e:[0.1111111111111111,0],w:[-0.1111111111111111,0],n:[0,0.1111111111111111],s:[0,-0.1111111111111111]}, introFrom: [0.33, 0.67], outroTo: [0.33, 0.67] },
      { color: '#f7f5f1', position: [0.798, 0.721], handles: {e:[0.24674479166666663,0.022483407079646023],w:[-0.1111111111111111,0],n:[0.04612025258112096,0.3833978613569321],s:[0,-0.1111111111111111]}, introFrom: [0.80, 0.72], outroTo: [0.80, 0.72] },
      { color: '#8FBED5', position: [1.000, 0.605], handles: {e:null,w:[-0.05721100663716816,0.19100294985250743],n:[0.011436439896755246,0.20026733038348088],s:[0.021916482300884832,-0.12171828908554572]}, introFrom: [1.20, 0.67], outroTo: [1.50, 1.00] },
      { color: '#f7f5f1', position: [0.000, 1.000], handles: {e:[0.1111111111111111,0],w:null,n:null,s:[0,-0.1111111111111111]}, introFrom: [-0.30, 1.30], outroTo: [-0.30, 1.30] },
      { color: '#f7f5f1', position: [0.539, 1.054], handles: {e:[0.1111111111111111,0],w:[-0.1111111111111111,0],n:null,s:[0,-0.1111111111111111]}, introFrom: [0.33, 1.30], outroTo: [0.33, 1.30] },
      { color: '#EFDFD5', position: [0.739, 1.014], handles: {e:[0.19066878687315636,0.01595685840707972],w:[-0.1111111111111111,0],n:null,s:[0.08242302728613571,-0.18875368731563424]}, introFrom: [0.50, 1.01], outroTo: [0.40, 1.30] },
      { color: '#263759', position: [1.006, 1.007], handles: {e:null,w:[-0.10920215707964598,-0.00821349557522133],n:null,s:[0.0224695796460177,-0.14948377581120953]}, introFrom: [1.10, 1.10], outroTo: [1.20, 1.20] },
    ],
  });

  gradient.playIntro();

  document.getElementById('end').addEventListener('click', () => gradient.playOutro());
</script>
</body>
</html>
