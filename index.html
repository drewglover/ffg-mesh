<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mesh gradient demo</title>
<style>
  html, body { margin: 0; padding: 0; min-height: 100vh; background: #0a0a14; color: white; font-family: system-ui, sans-serif; }
  main { position: relative; z-index: 1; max-width: 640px; margin: 0 auto; padding: 4rem 2rem; }
  h1 { font-weight: 500; font-size: 2.5rem; margin: 0 0 1rem; }
  p { line-height: 1.6; opacity: 0.85; }
  button {
    margin-top: 2rem; padding: 0.75rem 1.5rem; font: inherit; font-size: 0.95rem;
    background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px; cursor: pointer; backdrop-filter: blur(8px);
  }
  button:hover { background: rgba(255,255,255,0.15); }
</style>
</head>
<body>
<main>
  <h1>Mesh gradient demo</h1>
  <p>The background runs an intro animation on load, then drifts in a floating loop. Click the button to trigger the outro.</p>
  <button id="end">Play outro</button>
</main>
<script type="module">
  import { MeshGradient } from './mesh-gradient.js';

  // Tweak the nodes, colors, and timings here.
  // Each node has:
  //   position   — where it sits during the floating loop (0..1 across the viewport)
  //   introFrom  — where it starts during intro (e.g. off-screen at -0.3 or 1.3)
  //   outroTo    — where it ends up during outro
  //   color      — hex
  //   radius     — how big its color blob is (typical range 0.3 .. 0.8)
  const gradient = new MeshGradient({
    bgColor: '#f7f5f1',
    introDuration: 1800,
    outroDuration: 1400,
    floatAmplitude: 0.030,
    floatSpeed: 0.00018,
    nodes: [
      { color: '#F3DDBE', position: [0.130, 1.020], radius: 0.120, introFrom: [0.150, 1.030], outroTo: [0.150, 1.030] },
      { color: '#25dce9', position: [-0.080, 0.830], radius: 0.260, introFrom: [-0.080, 0.830], outroTo: [-0.080, 0.830] },
      { color: '#263759', position: [0.007, 0.971], radius: 0.500, introFrom: [0.010, 0.970], outroTo: [0.010, 0.970] },
      { color: '#f7f5f1', position: [0.127, 0.797], radius: 0.100, introFrom: [0.500, -0.300], outroTo: [0.500, 1.300] },
    ],
  });

  gradient.playIntro();
</script>
</body>
</html>
